- id: "DOC-002"
  title: "Exploration and Mining Investment Trends: National and Regional"
  type: research_report
  section: "01_Macro_Context"
  content_file: "exploration_investment_trends.md"
  description: >
    Data-focused document tracking mineral exploration expenditure at the national,
    Queensland, and NWMP levels. Draws on ABS 8412.0 quarterly data, Geoscience
    Australia annual assessments, and Queensland Government policy data to demonstrate
    that exploration investment — a leading indicator of demand for testing services —
    is robust and growing in the MICMRC's target region.
