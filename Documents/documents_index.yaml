- title: Critical Minerals Investment Landscape & Capital Flows
  type: research_report
  section: 01_Macro_Context
  description: Examines how capital is flowing into critical minerals development
    globally and into Australia specifically. Covers development finance institution
    (DFI) commitments from US DFC, EIB, JBIC, Export Finance Australia and NAIF; sovereign
    wealth fund activity; private equity and venture capital trends; green bonds and
    sustainable finance; project finance conditions and bankability requirements;
    the gap between announced and deployed capital; and whether capital availability
    is constraining new supply development.
