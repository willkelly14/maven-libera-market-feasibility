- id: DOC-019
  title: Transport, Energy, and Water Infrastructure Constraints on Mineral Supply
    Response
  type: research_report
  section: 01_Macro_Context
  description: Assesses whether physical infrastructure is a binding constraint on
    scaling mineral production globally and in Australia. Covers port capacity and
    shipping route congestion, rail and road logistics in major mining provinces,
    energy supply adequacy and cost for mineral processing, water availability constraints
    in arid mining jurisdictions, NWMP-specific infrastructure position (Mount Isa-Townsville
    rail corridor, CopperString, water allocations), and lead times and capital costs
    for infrastructure expansion.
  content_file: 17_Infrastructure_Constraints_Mineral_Supply_Response.md
