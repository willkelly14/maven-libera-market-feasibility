  title: 'Allied Nation Supply Chain Diversification: Australias Position'
  type: research_report
  section: 01_Macro_Context
  content_file: 05_Allied_Nation_Supply_Chain_Diversification.md
  description: Examines bilateral and multilateral critical minerals agreements between
