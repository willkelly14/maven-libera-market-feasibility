- id: DOC-009
  title: AI & Data Centre Infrastructure Mineral Demand
  type: research_report
  section: 01_Macro_Context
  content_file: 06_AI_Data_Centre_Mineral_Demand.md
  description: Examines the mineral demand implications of global AI and data centre
    infrastructure buildout. Quantifies projected data centre capacity growth in GW
    and estimates mineral intensity per GW for copper, silver, and rare earths. Assesses
    how this demand pathway interacts with existing NWMP commodity supply and demand
    dynamics.
