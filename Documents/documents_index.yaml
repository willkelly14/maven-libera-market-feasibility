  title: NWMP Regional Mineral Endowment Profile
  type: research_report
  section: 01_Macro_Context
  description: Data-backed profile of the mineral endowment across the North West
    Minerals Province (Queensland, Australia). Catalogues JORC-compliant resource
    estimates by commodity, current production tonnages, major operating mines and
    deposits, NWMP share of national resources, project development pipeline, and
