  title: Geopolitical Context & Strategic Demand Drivers
  type: research_report
  section: 01_Macro_Context
  content_file: 03_Geopolitical_Context_Strategic_Demand_Drivers.md
  description: Examines why critical minerals have become a national security issue.
    Covers US-China strategic competition, resource nationalism trends, defence applications,
    allied bloc formation (AUKUS, Quad, MSP/FORGE), and Australia's strategic premium
    as a Five Eyes mineral producer.
