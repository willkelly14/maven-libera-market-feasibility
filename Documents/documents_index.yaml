- title: Critical Minerals Price Outlook & Investment Cycle
  type: research_report
  section: 01_Macro_Context
  description: Compiles consensus price forecasts for NWMP commodities (lithium, cobalt,
    nickel, rare earths, manganese, graphite, vanadium, tungsten, antimony) over a
    5-10 year horizon. Examines the historical relationship between commodity prices
    and mineral exploration expenditure, assesses where each mineral sits in its price
    cycle, and documents government incentive mechanisms (Australian and international)
    including R&D rebates, exploration incentives, production tax credits, and strategic
    stockpiling programs.
