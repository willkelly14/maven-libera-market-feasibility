- id: "01-005"
  claim: >
    CopperString 2032 is a $5 billion, 1,100 km high-voltage
    transmission line from Townsville to Mount Isa, connecting the
    North West Minerals Province to the national electricity grid.
  source_quotes:
    - >
      $5 billion, 1,100 km high-voltage transmission line
      (Townsville to Mount Isa)
  source_excerpt: |
    **CopperString 2032** is a **$5 billion, 1,100 km high-voltage transmission line** running from
    Townsville to Mount Isa. It will connect the **North West Minerals Province** to the **national
    electricity grid** for the first time, enabling access to renewable energy and reducing the
    region's dependence on gas-fired generation.

    The Queensland Government has committed **$1.3 billion** to progress construction. A construction
    workforce accommodation facility is already underway at **Richmond** (capacity for 250 workers).
    The project is expected to significantly reduce energy costs for mining operations in the region
    and enable electrification of processing facilities.
  source_name: "CopperString 2032 Announcement"
  source_author: "Queensland Government"
  source_url: "https://statements.qld.gov.au/statements/101465"
  source_type: government_publication
  source_date: ""
  document: "DOC-001"
  sections_used:
    - "01_Macro_Context"
  verified: false
  verification_notes: ""
  date_added: "2026-03-09"
  added_by: "agent"

- id: "01-006"
  claim: >
    The North West Minerals Province has $2.3 billion in facilitated
    investment, 1,700 ongoing jobs, and an estimated $500 billion
    in mineral wealth.
  source_quotes:
    - "$2.3 billion in facilitated investment, 1,700 ongoing jobs"
    - "$500 billion estimated mineral wealth"
  source_excerpt: |
    The **North West Minerals Province (NWMP)** is one of the world's most significant mineral-rich
    regions. Key statistics from the Queensland Department of State Development:

    | Metric | Value |
    |--------|-------|
    | Facilitated investment | $2.3 billion |
    | Ongoing jobs | 1,700 |
    | Estimated mineral wealth | $500 billion |
    | Key commodities | Vanadium, cobalt, graphite, zinc, silver, copper, phosphate, lead |

    The region faces a major transition with the announced closures of Glencore's **Mt Isa copper
    mine** and **Lady Loretta zinc mine** in 2025, supported by **$50 million** in Glencore
    transition funding.
  source_name: "North West Minerals Province — Regional Priorities"
  source_author: "Queensland Department of State Development"
  source_url: "https://www.statedevelopment.qld.gov.au/regions/regional-priorities/a-strong-and-prosperous-north-west-queensland"
