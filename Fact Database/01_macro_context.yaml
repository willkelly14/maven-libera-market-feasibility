# Fact Database — Section 01: Macro Market Context
# See SCHEMA.md for field definitions

- id: "01-001"
  claim: >
    The Australian Government allocated A$566.1 million over 10 years
    from 2024-25 for data, maps and tools for the resources industry.
  source_quotes:
    - >
      A$566.1 million over 10 years from 2024-25 for data, maps and
      tools for the resources industry
  source_excerpt: |
    The *Future Made in Australia* agenda includes significant investment in the critical minerals sector.
    Key measures include **A$566.1 million over 10 years from 2024–25** for geoscience data, maps and
    pre-competitive tools for the resources industry, alongside a new Critical Minerals Production Tax
    Incentive providing 10% of processing and refining costs for eligible projects.

    These measures aim to position Australia as a globally significant producer and processor of
    critical minerals, leveraging the country's geological endowment and stable regulatory environment.
  source_name: "Future Made in Australia — Critical Minerals"
  source_author: "Department of Industry, Science and Resources"
  source_url: "https://www.industry.gov.au/mining-oil-and-gas/minerals/critical-minerals"
  source_type: government_publication
  source_date: "2024"
  document: "DOC-001"
  sections_used:
    - "01_Macro_Context"
  verified: false
  verification_notes: ""
