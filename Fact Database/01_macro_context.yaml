- id: "01-009"
  claim: >
    USD $500-600 billion in new mining capex is required to 2040
    to meet projected critical minerals demand.
  source_quotes:
    - >
      Investment required: USD $500-600 billion in new mining
      capex to 2040
  source_excerpt: |
    The IEA estimates that **USD $500–600 billion in new mining capital expenditure** is needed
    globally by 2040 to meet projected critical minerals demand under clean energy transition
    scenarios. This represents a step-change in mining investment, with current annual mining
    capex insufficient to bring enough new supply online.

    The report highlights a potential **30% copper supply shortfall by 2035** based on the
    current mine pipeline, and notes that existing mines plus projects under construction
    meet only **~50% of lithium/cobalt needs** and **~80% of copper needs** by 2030.
  source_name: "Global Critical Minerals Outlook 2025"
  source_author: "International Energy Agency"
  source_url: "https://www.iea.org/reports/global-critical-minerals-outlook-2025"
  source_type: international_organisation
  source_date: "2025"
  document: "DOC-001"
  sections_used:
    - "01_Macro_Context"
    - "07_Growth_Outlook"
  verified: false
  verification_notes: ""
  date_added: "2026-03-09"
  added_by: "agent"

- id: "01-010"
  claim: >
    Australia's critical minerals exports are projected to reach
    approximately 10% of resource exports by 2030, up from
    approximately 6%.
  source_quotes:
    - >
      Australia's critical minerals exports projected to reach ~10%
      of resource exports by 2030 (up from ~6%)
  source_excerpt: |
    The RBA Bulletin article *The Global Energy Transition and Critical Minerals* (October 2025)
    by Harry Stinson and Irene Cam examines Australia's position in the global critical minerals
    market:

    - Australia's critical minerals exports projected to reach **~10% of resource exports by 2030**
      (up from ~6%)
    - Late-stage **lithium projects delayed** in 2024 due to low prices
    - **Nickel production declining** (projects cancelled, production scaled back)
    - **Lithium, rare earths, copper** production expected to increase strongly over next 5 years

    The article notes that while Australia has significant geological endowment, realising this
    potential depends on commodity prices, policy support, and the development of downstream
    processing capability.
  source_name: "The Global Energy Transition and Critical Minerals"
  source_author: "Reserve Bank of Australia (Harry Stinson and Irene Cam)"
  source_url: "https://www.rba.gov.au/publications/bulletin/2025/oct/the-global-energy-transition-and-critical-minerals.html"
  source_type: government_publication
