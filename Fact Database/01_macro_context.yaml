  added_by: "agent"

- id: "01-002"
  claim: >
    The Critical Minerals Production Tax Incentive provides 10% of
    processing/refining costs, for up to 10 years per project, for
    production between 2027-28 and 2039-40.
  source_quotes:
    - >
      Critical Minerals Production Tax Incentive: 10% of processing
      and refining costs, up to 10 years per project (production
      between 2027-28 and 2039-40)
  source_excerpt: |
    The **Critical Minerals Production Tax Incentive** is a core element of the Future Made in Australia
    package. It provides a **10% tax incentive on processing and refining costs** for eligible critical
    minerals projects, available for **up to 10 years per project**.

    Eligible production must occur between **2027–28 and 2039–40**. The incentive is designed to
    encourage downstream processing of critical minerals in Australia rather than exporting raw
    materials, supporting the development of value-added supply chains.
  source_name: "Future Made in Australia — Critical Minerals"
  source_author: "Department of Industry, Science and Resources"
  source_url: "https://www.industry.gov.au/mining-oil-and-gas/minerals/critical-minerals"
  source_type: government_publication
  source_date: "2024"
  document: "DOC-001"
  sections_used:
    - "01_Macro_Context"
  verified: false
  verification_notes: ""
  date_added: "2026-03-09"
  added_by: "agent"

- id: "01-003"
  claim: >
    The Australian Government allocated $1.2 billion in the 2025-26
    federal budget for a Critical Minerals Strategic Reserve.
  source_quotes:
    - "$1.2 billion allocated in 2025-26 federal budget"
  source_excerpt: |
    In April 2025, the Australian Government announced the establishment of a **Critical Minerals
    Strategic Reserve**, with **$1.2 billion allocated in the 2025–26 federal budget**. The reserve
    is intended to stockpile critical minerals essential for national security and the clean energy
    transition, ensuring supply continuity during periods of market disruption.

    The initiative reflects growing global concern about supply chain concentration, with China
    currently dominating processing of many critical minerals including rare earths, lithium,
    and cobalt.
  source_name: "Critical Minerals Strategic Reserve"
  source_author: "Department of the Prime Minister and Cabinet"
  source_url: "https://www.pmc.gov.au/domestic-policy/critical-minerals-strategic-reserve"
  source_type: government_publication
  source_date: "2025-04"
  document: "DOC-001"
  sections_used:
    - "01_Macro_Context"
  verified: false
  verification_notes: ""
  date_added: "2026-03-09"
  added_by: "agent"

- id: "01-004"
  claim: >
    The Queensland Government committed $245 million in initiatives
    under its Critical Minerals Strategy.
  source_quotes:
    - "$245 million in initiatives"
  source_excerpt: |
    The Queensland Critical Minerals Strategy outlines the state government's plan to develop
    Queensland as a significant player in the global critical minerals supply chain. The strategy
    commits **$245 million in initiatives** targeting exploration, processing, infrastructure,
    and workforce development.

    Key focus areas include the **North West Minerals Province** (centred on Mount Isa) and the
    state's **70% renewable energy target by 2032**, which creates domestic demand for critical
    minerals used in renewable energy technologies.
  source_name: "Queensland Critical Minerals Strategy"
  source_author: "Queensland Government"
  source_url: "https://www.resources.qld.gov.au/__data/assets/pdf_file/0005/1726430/critical-minerals-strategy.pdf"
  source_type: government_publication
  source_date: ""
