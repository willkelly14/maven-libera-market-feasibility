- id: "01-007"
  claim: >
    Total Australian mineral exploration expenditure in 2024 was
    $3.95 billion, down 7.3% from $4.26 billion in 2023.
  source_quotes:
    - >
      Total mineral exploration: $3.95 billion (down 7.3% from
      $4.26B in 2023)
  source_excerpt: |
    ABS data on mineral and petroleum exploration for the 2024 calendar year shows:

    | Metric | Value |
    |--------|-------|
    | Total mineral exploration (2024) | $3.95 billion |
    | Change from 2023 | ↓7.3% (from $4.26B) |
    | Brownfield exploration | $2,823 million |
    | Greenfield exploration | $1,126 million |
    | "Other commodities" (Li, Mn, Mo, P, Sn, W, V) | $667.5 million |
    | Q4 2024 (seasonally adjusted) | $963 million (↑1.3% QoQ) |

    Queensland-specific figures show **$919.7 million** in the 12 months to June 2024
    (↑$148.3M year-on-year), representing approximately **14%** of the national total.
  source_name: "Mineral and Petroleum Exploration, Australia"
