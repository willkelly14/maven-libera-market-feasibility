- id: "01-008"
  claim: >
    Lithium demand is projected to grow 5x by 2040, graphite and
    nickel demand to double by 2040, cobalt and rare earths to
    increase 50-60% by 2040, and copper to increase 30% by 2040.
  source_quotes:
    - "Lithium demand: 5x growth by 2040"
    - "Graphite + nickel: 2x by 2040"
    - "Cobalt + rare earths: up 50-60% by 2040"
    - "Copper: up 30% by 2040"
  source_excerpt: |
    The IEA's *Global Critical Minerals Outlook 2025* projects substantial demand growth for
    key critical minerals driven by the clean energy transition:

    | Mineral | Projected demand growth by 2040 |
    |---------|-------------------------------|
    | Lithium | 5× current levels |
    | Graphite | 2× current levels |
    | Nickel | 2× current levels |
    | Cobalt | ↑50–60% |
    | Rare earths | ↑50–60% |
    | Copper | ↑30% |

    The report also notes that **top-3 mining country market share** increased from 73% (2020)
    to 77% (2024), highlighting growing supply concentration risk. Meeting these demand projections
    will require **USD $500–600 billion in new mining capex** to 2040.
  source_name: "Global Critical Minerals Outlook 2025"
  source_author: "International Energy Agency"
  source_url: "https://www.iea.org/reports/global-critical-minerals-outlook-2025"
  source_type: international_organisation
  source_date: "2025"
  document: "DOC-001"
  sections_used:
    - "01_Macro_Context"
    - "04_Demand_Assessment"
    - "07_Growth_Outlook"
