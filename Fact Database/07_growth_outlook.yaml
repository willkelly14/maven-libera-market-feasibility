    to $0 for five years (until 31 August 2028), representing approximately $55 million in forgone revenue, to support companies
    to redirect funds towards exploration activities.

    '
  source_quotes:
  - 'From 1 September 2023, the Queensland Government is reducing the rent for new and existing exploration permits for minerals
    to $0 for 5 years.

    '
